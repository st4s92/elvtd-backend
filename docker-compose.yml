version: '3.8'

services:
  app:
    build: .
    container_name: elvtd_backend
    ports:
      - "5021:5021"
    env_file:
      - .env
    environment:
      - DB_DRIVER=${DOC_DB_DRIVER}
      - DB_HOST=${DOC_DB_HOST}
      - DB_PORT=${DOC_DB_PORT}
      - DB_NAME=${DOC_DB_NAME}
      - DB_USER=${DOC_DB_USER}
      - DB_PASSWORD=${DOC_DB_PASSWORD}
      - COPY_TOLERANCE_SECOND=${COPY_TOLERANCE_SECOND}
      - MAX_SERVER_ACCOUNTS=${MAX_SERVER_ACCOUNTS}
    depends_on:
      - database

  database:
    platform: linux/x86_64
    image: mysql:8.0.28
    container_name: elvtd_mysql
    ports: 
      - "${DOC_DB_PORT}:3306"
    environment: 
      - MYSQL_ROOT_HOST=${DOC_DB_HOST}
      - MYSQL_USER=${DOC_DB_USER}
      - MYSQL_PASSWORD=${DOC_DB_PASSWORD}
      - MYSQL_DATABASE=${DOC_DB_NAME}
      - MYSQL_ROOT_PASSWORD=${DOC_DB_PASSWORD}
      - RABBITMQ_HOST=${RABBITMQ_HOST}
      - RABBITMQ_PORT=${RABBITMQ_PORT}
      - RABBITMQ_USER=${RABBITMQ_USER}
      - RABBITMQ_PASS=${RABBITMQ_PASS}
    volumes:
      - database_mysql:/var/lib/mysql

  message:
    image: rabbitmq:3.13-management
    container_name: elvtd_rabbitmq
    restart: unless-stopped

    ports:
      - "5672:5672"     # AMQP (client Go)
      - "15672:15672"   # Management UI

    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
      RABBITMQ_DEFAULT_VHOST: /

    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  database_mysql:
  rabbitmq_data:
